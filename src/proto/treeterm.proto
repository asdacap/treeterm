syntax = "proto3";

package treeterm;

// ============================================
// Common Types
// ============================================

message Empty {}

message SandboxConfig {
  bool enabled = 1;
  bool allow_network = 2;
  repeated string allowed_paths = 3;
}

message AppState {
  string application_id = 1;
  string title = 2;
  bytes state = 3;  // JSON-encoded arbitrary state
}

message Workspace {
  string path = 1;
  string name = 2;
  optional string parent_id = 3;
  string status = 4;  // 'active' | 'merged' | 'abandoned'
  bool is_git_repo = 5;
  optional string git_branch = 6;
  optional string git_root_path = 7;
  bool is_worktree = 8;
  optional bool is_detached = 9;
  map<string, AppState> app_states = 10;
  optional string active_tab_id = 11;
  int64 created_at = 12;
  int64 last_activity = 13;
  string id = 15;
  repeated string children = 16;
  bytes metadata = 17;  // JSON-encoded arbitrary dictionary
}

message Session {
  string id = 1;
  repeated Workspace workspaces = 2;
  int64 created_at = 3;
  int64 last_activity = 4;
}

message WorkspaceInput {
  string path = 1;
  string name = 2;
  optional string parent_id = 3;
  string status = 4;
  bool is_git_repo = 5;
  optional string git_branch = 6;
  optional string git_root_path = 7;
  bool is_worktree = 8;
  optional bool is_detached = 9;
  map<string, AppState> app_states = 10;
  optional string active_tab_id = 11;
  string id = 12;
  repeated string children = 13;
  bytes metadata = 14;  // JSON-encoded arbitrary dictionary
}

message PtySessionInfo {
  string id = 1;
  string cwd = 2;
  int32 cols = 3;
  int32 rows = 4;
  int64 created_at = 5;
  int64 last_activity = 6;
}

// ============================================
// PTY Session Messages
// ============================================

message CreatePtyRequest {
  string cwd = 1;
  map<string, string> env = 2;
  optional int32 cols = 3;
  optional int32 rows = 4;
  optional SandboxConfig sandbox = 5;
  optional string startup_command = 6;
}

message CreatePtyResponse {
  string session_id = 1;
}

message AttachPtyRequest {
  string session_id = 1;
}

message AttachPtyResponse {
  repeated string scrollback = 1;
  optional int32 exit_code = 2;
}

message ResizePtyRequest {
  string session_id = 1;
  int32 cols = 2;
  int32 rows = 3;
}

message KillPtyRequest {
  string session_id = 1;
}

message GetScrollbackRequest {
  string session_id = 1;
}

message GetScrollbackResponse {
  repeated string scrollback = 1;
}

message ListPtySessionsResponse {
  repeated PtySessionInfo sessions = 1;
}

// ============================================
// PTY Streaming Messages (Bidirectional)
// ============================================

message PtyInput {
  oneof input {
    PtyWriteData write = 1;
    PtyResizeData resize = 2;
  }
}

message PtyWriteData {
  string session_id = 1;
  bytes data = 2;  // Use bytes for terminal data (may contain non-UTF8)
}

message PtyResizeData {
  string session_id = 1;
  int32 cols = 2;
  int32 rows = 3;
}

message PtyOutput {
  oneof output {
    PtyData data = 1;
    PtyExit exit = 2;
  }
}

message PtyData {
  string session_id = 1;
  bytes data = 2;  // Terminal output data
}

message PtyExit {
  string session_id = 1;
  int32 exit_code = 2;
  optional int32 signal = 3;
}

// ============================================
// Exec Streaming Messages (Bidirectional)
// ============================================

message ExecInput {
  oneof input {
    ExecStart start = 1;
    bytes stdin = 2;
    ExecSignal signal = 3;
  }
}

message ExecStart {
  string cwd = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;    // Environment variable injection
  optional int32 timeout_ms = 5;  // 0 = no timeout, default 30000 (30s)
}

message ExecSignal {
  int32 signal = 1;
}

message ExecOutput {
  oneof output {
    ExecStdout stdout = 1;
    ExecStderr stderr = 2;
    ExecResult result = 3;
  }
}

message ExecStdout {
  bytes data = 1;
}

message ExecStderr {
  bytes data = 1;
}

message ExecResult {
  int32 exit_code = 1;
  optional string error = 2;  // System error only (spawn failure, etc.)
}

// ============================================
// Workspace Session Messages
// ============================================

message CreateSessionRequest {
  repeated WorkspaceInput workspaces = 1;
}

message UpdateSessionRequest {
  string session_id = 1;
  repeated WorkspaceInput workspaces = 2;
  optional string sender_id = 3;  // Window UUID to exclude from broadcast
}

message SessionWatchRequest {
  string session_id = 1;
  string listener_id = 2;  // Window UUID
}

message SessionWatchEvent {
  string session_id = 1;
  Session session = 2;
  string sender_id = 3;  // Who triggered the update
}

message GetDefaultSessionIdResponse {
  string session_id = 1;
}

message DeleteSessionRequest {
  string session_id = 1;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

// ============================================
// Git Messages - Kept for backward compatibility
// Note: Git operations are now handled in Main process via ExecStream
// ============================================

// Legacy git messages retained for generated type compatibility
// These will be removed in a future version

message GitInfoRequest {
  string dir_path = 1;
}

message GitInfoResponse {
  bool is_repo = 1;
  optional string branch = 2;
  optional string root_path = 3;
}

message CreateWorktreeRequest {
  string repo_path = 1;
  string worktree_name = 2;
  optional string base_branch = 3;
}

message CreateWorktreeResponse {
  bool success = 1;
  optional string path = 2;
  optional string branch = 3;
  optional string error = 4;
}

message RemoveWorktreeRequest {
  string repo_path = 1;
  string worktree_path = 2;
  bool delete_branch = 3;
}

message WorktreeInfo {
  string path = 1;
  string branch = 2;
}

message ListWorktreesRequest {
  string repo_path = 1;
}

message ListWorktreesResponse {
  repeated WorktreeInfo worktrees = 1;
}

message GetChildWorktreesRequest {
  string repo_path = 1;
  optional string parent_branch = 2;
}

message ChildWorktreeInfo {
  string path = 1;
  string branch = 2;
  string display_name = 3;
}

message GetChildWorktreesResponse {
  repeated ChildWorktreeInfo worktrees = 1;
}

message DiffFile {
  string path = 1;
  string status = 2;  // 'added' | 'modified' | 'deleted' | 'renamed'
  int32 additions = 3;
  int32 deletions = 4;
}

message DiffResult {
  repeated DiffFile files = 1;
  int32 total_additions = 2;
  int32 total_deletions = 3;
  string base_branch = 4;
  string head_branch = 5;
}

message GetDiffRequest {
  string worktree_path = 1;
  string parent_branch = 2;
}

message GetDiffResponse {
  bool success = 1;
  optional DiffResult diff = 2;
  optional string error = 3;
}

message GetFileDiffRequest {
  string worktree_path = 1;
  string parent_branch = 2;
  string file_path = 3;
}

message GetFileDiffResponse {
  bool success = 1;
  optional string diff = 2;
  optional string error = 3;
}

message MergeWorktreeRequest {
  string main_repo_path = 1;
  string worktree_branch = 2;
  string target_branch = 3;
  bool squash = 4;
}

message MergeWorktreeResponse {
  bool success = 1;
  optional string error = 2;
}

message HasUncommittedChangesRequest {
  string repo_path = 1;
}

message HasUncommittedChangesResponse {
  bool has_changes = 1;
}

message CommitAllRequest {
  string repo_path = 1;
  string message = 2;
}

message CommitAllResponse {
  bool success = 1;
  optional string error = 2;
}

message DeleteBranchRequest {
  string repo_path = 1;
  string branch_name = 2;
}

message DeleteBranchResponse {
  bool success = 1;
  optional string error = 2;
}

message UncommittedFile {
  string path = 1;
  string status = 2;  // 'added' | 'modified' | 'deleted' | 'renamed' | 'untracked'
  bool staged = 3;
  int32 additions = 4;
  int32 deletions = 5;
}

message UncommittedChanges {
  repeated UncommittedFile files = 1;
  int32 total_additions = 2;
  int32 total_deletions = 3;
}

message GetUncommittedChangesRequest {
  string repo_path = 1;
}

message GetUncommittedChangesResponse {
  bool success = 1;
  optional UncommittedChanges changes = 2;
  optional string error = 3;
}

message GetUncommittedFileDiffRequest {
  string repo_path = 1;
  string file_path = 2;
  bool staged = 3;
}

message StageFileRequest {
  string repo_path = 1;
  string file_path = 2;
}

message StageFileResponse {
  bool success = 1;
  optional string error = 2;
}

message StageAllRequest {
  string repo_path = 1;
}

message StageAllResponse {
  bool success = 1;
  optional string error = 2;
}

message CommitStagedRequest {
  string repo_path = 1;
  string message = 2;
}

message CommitStagedResponse {
  bool success = 1;
  optional string error = 2;
}

message ConflictInfo {
  bool has_conflicts = 1;
  repeated string conflicted_files = 2;
  repeated string messages = 3;
}

message CheckMergeConflictsRequest {
  string repo_path = 1;
  string source_branch = 2;
  string target_branch = 3;
}

message CheckMergeConflictsResponse {
  bool success = 1;
  optional ConflictInfo conflicts = 2;
  optional string error = 3;
}

message FileDiffContents {
  string original_content = 1;
  string modified_content = 2;
  string language = 3;
}

message GetFileContentsForDiffRequest {
  string worktree_path = 1;
  string parent_branch = 2;
  string file_path = 3;
}

message GetFileContentsForDiffResponse {
  bool success = 1;
  optional FileDiffContents contents = 2;
  optional string error = 3;
}

message GetUncommittedFileContentsForDiffRequest {
  string repo_path = 1;
  string file_path = 2;
  bool staged = 3;
}

message ListLocalBranchesRequest {
  string repo_path = 1;
}

message ListLocalBranchesResponse {
  repeated string branches = 1;
}

message ListRemoteBranchesRequest {
  string repo_path = 1;
}

message ListRemoteBranchesResponse {
  repeated string branches = 1;
}

message GetBranchesInWorktreesRequest {
  string repo_path = 1;
}

message GetBranchesInWorktreesResponse {
  repeated string branches = 1;
}

message CreateWorktreeFromBranchRequest {
  string repo_path = 1;
  string branch = 2;
  string worktree_name = 3;
}

message CreateWorktreeFromRemoteRequest {
  string repo_path = 1;
  string remote_branch = 2;
  string worktree_name = 3;
}

message GetHeadCommitHashRequest {
  string repo_path = 1;
}

message GetHeadCommitHashResponse {
  bool success = 1;
  optional string hash = 2;
  optional string error = 3;
}

// ============================================
// Streaming Messages for Diffs and File I/O
// ============================================

// Diff streaming messages
message DiffChunk {
  oneof chunk {
    DiffChunkData data = 1;
    DiffChunkEnd end = 2;
    DiffChunkError error = 3;
  }
}

message DiffChunkData {
  bytes data = 1;  // Chunk of diff content
}

message DiffChunkEnd {
  bool success = 1;
}

message DiffChunkError {
  string message = 1;
}

// File contents streaming messages
message FileContentsChunk {
  oneof chunk {
    FileContentsHeader header = 1;    // First message with metadata
    FileContentsData data = 2;        // Content chunks
    FileContentsEnd end = 3;
  }
}

message FileContentsHeader {
  string language = 1;
  bool is_original = 2;  // true = original content, false = modified
}

message FileContentsData {
  bytes data = 1;
}

message FileContentsEnd {
  bool success = 1;
  optional string error = 2;
}

// File read streaming messages
message FileReadChunk {
  oneof chunk {
    FileReadHeader header = 1;
    FileReadData data = 2;
    FileReadEnd end = 3;
  }
}

message FileReadHeader {
  string path = 1;
  int64 size = 2;
  string language = 3;
}

message FileReadData {
  bytes data = 1;
}

message FileReadEnd {
  bool success = 1;
  optional string error = 2;
}

// File write streaming messages (client to server)
message FileWriteChunk {
  oneof chunk {
    FileWriteHeader header = 1;   // First message with path
    FileWriteData data = 2;       // Content chunks
    FileWriteEnd end = 3;
  }
}

message FileWriteHeader {
  string workspace_path = 1;
  string file_path = 2;
}

message FileWriteData {
  bytes data = 1;
}

message FileWriteEnd {}

// ============================================
// Filesystem Messages
// ============================================

message FileEntry {
  string name = 1;
  string path = 2;
  string relative_path = 3;
  bool is_directory = 4;
  optional int64 size = 5;
  optional double modified_time = 6;
}

message DirectoryContents {
  string path = 1;
  repeated FileEntry entries = 2;
}

message SearchFilesRequest {
  string workspace_path = 1;
  string query = 2;
}

message SearchFilesResponse {
  bool success = 1;
  repeated FileEntry entries = 2;
  optional string error = 3;
}

message ReadDirectoryRequest {
  string workspace_path = 1;
  string dir_path = 2;
}

message ReadDirectoryResponse {
  bool success = 1;
  optional DirectoryContents contents = 2;
  optional string error = 3;
}

message FileContents {
  string path = 1;
  string content = 2;
  int64 size = 3;
  string language = 4;
}

message ReadFileRequest {
  string workspace_path = 1;
  string file_path = 2;
}

message ReadFileResponse {
  bool success = 1;
  optional FileContents file = 2;
  optional string error = 3;
}

message WriteFileRequest {
  string workspace_path = 1;
  string file_path = 2;
  string content = 3;
}

message WriteFileResponse {
  bool success = 1;
  optional string error = 2;
}

// ============================================
// Service Definition
// ============================================

service TreeTermDaemon {
  // PTY Session Management (Unary RPCs)
  rpc CreatePty(CreatePtyRequest) returns (CreatePtyResponse);
  rpc AttachPty(AttachPtyRequest) returns (AttachPtyResponse);
  rpc ResizePty(ResizePtyRequest) returns (Empty);
  rpc KillPty(KillPtyRequest) returns (Empty);
  rpc ListPtySessions(Empty) returns (ListPtySessionsResponse);
  rpc GetScrollback(GetScrollbackRequest) returns (GetScrollbackResponse);

  // PTY Data Streaming (Bidirectional)
  // Client sends input (write/resize), server sends output (data/exit)
  rpc PtyStream(stream PtyInput) returns (stream PtyOutput);

  // Exec Streaming (Bidirectional)
  // For executing one-shot shell commands with streaming I/O
  rpc ExecStream(stream ExecInput) returns (stream ExecOutput);

  // Workspace Session Management
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc UpdateSession(UpdateSessionRequest) returns (Session);
  rpc DeleteSession(DeleteSessionRequest) returns (Empty);
  rpc ListSessions(Empty) returns (ListSessionsResponse);
  rpc GetDefaultSessionId(Empty) returns (GetDefaultSessionIdResponse);
  rpc SessionWatch(SessionWatchRequest) returns (stream SessionWatchEvent);

  // Daemon Control
  rpc Shutdown(Empty) returns (Empty);

  // Filesystem Operations
  rpc ReadDirectory(ReadDirectoryRequest) returns (ReadDirectoryResponse);
  rpc ReadFile(ReadFileRequest) returns (stream FileReadChunk);
  rpc WriteFile(stream FileWriteChunk) returns (WriteFileResponse);
  rpc SearchFiles(SearchFilesRequest) returns (SearchFilesResponse);
}
