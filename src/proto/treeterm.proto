syntax = "proto3";

package treeterm;

// ============================================
// Common Types
// ============================================

message Empty {}

message SandboxConfig {
  bool enabled = 1;
  bool allow_network = 2;
  repeated string allowed_paths = 3;
}

// Membership entry for the in-process workspace list. The workspace body
// (name, status, git info, app states, metadata, ...) lives in a JSON file at
// <workspace_data_dir>/<id>.json — opaque to the daemon, schema owned by the client.
message WorkspaceRef {
  string id = 1;    // Client-generated, also the JSON filename stem
  string path = 2;  // Workspace/worktree directory path
}

message SessionLock {
  int64 acquired_at = 2;
  int64 expires_at = 3;
}

message Session {
  string id = 1;
  reserved 2;
  reserved "workspaces";
  int64 created_at = 3;
  int64 last_activity = 4;
  uint64 version = 5;  // Monotonically increasing version, incremented on every update
  optional SessionLock lock = 6;
  repeated WorkspaceRef workspace_refs = 7;
  // Daemon-resolved absolute directory holding the per-workspace JSON files
  // (e.g. /home/user/.treeterm/workspaces). Clients use this as the
  // workspace_path scope for ReadFile/WriteFile/WatchFile/DeleteFile on them.
  string workspace_data_dir = 8;
}

message PtySessionInfo {
  string id = 1;
  string cwd = 2;
  int32 cols = 3;
  int32 rows = 4;
  int64 created_at = 5;
  int64 last_activity = 6;
}

// ============================================
// PTY Session Messages
// ============================================

message CreatePtyRequest {
  string cwd = 1;
  map<string, string> env = 2;
  optional int32 cols = 3;
  optional int32 rows = 4;
  optional SandboxConfig sandbox = 5;
  optional string startup_command = 6;
  // Client-minted idempotency key (the tab's persisted ptyHandle). When set and a
  // live session already exists for it, that session is returned instead of a new one.
  optional string handle = 7;
}

message CreatePtyResponse {
  string session_id = 1;
}

message KillPtyRequest {
  string session_id = 1;
}

message ListPtySessionsResponse {
  repeated PtySessionInfo sessions = 1;
}

// ============================================
// PTY Streaming Messages (Bidirectional)
// ============================================

message PtyInput {
  oneof input {
    PtyStartData start = 1;    // First message, scopes stream to a session
    PtyWriteData write = 2;
    PtyResizeData resize = 3;
  }
}

message PtyStartData {
  string session_id = 1;
}

message PtyWriteData {
  bytes data = 1;  // Use bytes for terminal data (may contain non-UTF8)
}

message PtyResizeData {
  int32 cols = 1;
  int32 rows = 2;
}

message PtyOutput {
  oneof output {
    PtyData data = 1;
    PtyExit exit = 2;
    PtyResizeData resize = 3;
  }
}

message PtyData {
  bytes data = 1;  // Terminal output data
}

message PtyExit {
  int32 exit_code = 1;
  optional int32 signal = 2;
}

// ============================================
// Exec Streaming Messages (Bidirectional)
// ============================================

message ExecInput {
  oneof input {
    ExecStart start = 1;
    bytes stdin = 2;
    ExecSignal signal = 3;
  }
}

message ExecStart {
  string cwd = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;    // Environment variable injection
  optional int32 timeout_ms = 5;  // 0 = no timeout, default 30000 (30s)
}

message ExecSignal {
  int32 signal = 1;
}

message ExecOutput {
  oneof output {
    ExecStdout stdout = 1;
    ExecStderr stderr = 2;
    ExecResult result = 3;
  }
}

message ExecStdout {
  bytes data = 1;
}

message ExecStderr {
  bytes data = 1;
}

message ExecResult {
  int32 exit_code = 1;
  optional string error = 2;  // System error only (spawn failure, etc.)
}

// ============================================
// Workspace Session Messages
// One session per daemon. Multiple sessions = multiple daemon instances.
// ============================================

message UpdateSessionRequest {
  // Field 1 (session_id) removed — daemon has exactly one session
  reserved 2;
  reserved "workspaces";
  optional string sender_id = 3;  // Window UUID to exclude from broadcast
  optional uint64 expected_version = 4;  // Optimistic lock: must match current version for update to apply
  repeated WorkspaceRef workspace_refs = 5;
}

message SessionWatchRequest {
  // Field 1 (session_id) removed — daemon has exactly one session
  string listener_id = 2;  // Window UUID
}

message SessionWatchEvent {
  // Field 1 (session_id) removed — daemon has exactly one session
  Session session = 2;
  string sender_id = 3;  // Who triggered the update
}

message LockSessionRequest {
  optional int64 ttl_ms = 2;  // Lock TTL in milliseconds (default 60000)
}

message LockSessionResponse {
  bool acquired = 1;
  Session session = 2;
}

message UnlockSessionRequest {
}

message ForceUnlockSessionRequest {}

// ============================================
// File I/O Streaming Messages
// ============================================

// File read streaming messages
message FileReadChunk {
  oneof chunk {
    FileReadHeader header = 1;
    FileReadData data = 2;
    FileReadEnd end = 3;
  }
}

message FileReadHeader {
  string path = 1;
  int64 size = 2;
  string language = 3;
}

message FileReadData {
  bytes data = 1;
}

message FileReadEnd {
  bool success = 1;
  optional string error = 2;
}

// File write streaming messages (client to server)
message FileWriteChunk {
  oneof chunk {
    FileWriteHeader header = 1;   // First message with path
    FileWriteData data = 2;       // Content chunks
    FileWriteEnd end = 3;
  }
}

message FileWriteHeader {
  string workspace_path = 1;
  string file_path = 2;
  // Compare-and-swap guard. Unset: unconditional write. Empty string: the file
  // must not exist. Otherwise: lowercase-hex SHA-256 the current file bytes must match.
  optional string expected_sha256 = 3;
}

message FileWriteData {
  bytes data = 1;
}

message FileWriteEnd {}

// ============================================
// File Watch Messages
// ============================================

message WatchFileRequest {
  string workspace_path = 1;  // Scoping root, same semantics as ReadFile
  string file_path = 2;
  string watcher_id = 3;      // Client-generated UUID (required)
}

message FilePresent {
  bytes content = 1;
  string sha256 = 2;  // Lowercase-hex SHA-256 of content, usable as expected_sha256 in WriteFile
}

message FileAbsent {}

// The first event on the stream is always the current state.
message FileWatchEvent {
  oneof state {
    FilePresent present = 1;
    FileAbsent absent = 2;
  }
}

message FileSignalPresent {
  string sha256 = 1;
}

message FileSignalEvent {
  oneof state {
    FileSignalPresent present = 1;
    FileAbsent absent = 2;
  }
}

message DeleteFileRequest {
  string workspace_path = 1;
  string file_path = 2;
}

message DeleteFileResponse {
  bool success = 1;
  optional string error = 2;
}

// ============================================
// Filesystem Messages
// ============================================

message FileEntry {
  string name = 1;
  string path = 2;
  string relative_path = 3;
  bool is_directory = 4;
  optional int64 size = 5;
  optional double modified_time = 6;
}

message DirectoryContents {
  string path = 1;
  repeated FileEntry entries = 2;
}

message SearchFilesRequest {
  string workspace_path = 1;
  string query = 2;
}

message SearchFilesResponse {
  bool success = 1;
  repeated FileEntry entries = 2;
  optional string error = 3;
}

message ReadDirectoryRequest {
  string workspace_path = 1;
  string dir_path = 2;
}

message ReadDirectoryResponse {
  bool success = 1;
  optional DirectoryContents contents = 2;
  optional string error = 3;
}

message FileContents {
  string path = 1;
  string content = 2;
  int64 size = 3;
  string language = 4;
}

message ReadFileRequest {
  string workspace_path = 1;
  string file_path = 2;
}

message ReadFileResponse {
  bool success = 1;
  optional FileContents file = 2;
  optional string error = 3;
}

message WriteFileRequest {
  string workspace_path = 1;
  string file_path = 2;
  string content = 3;
}

message WriteFileResponse {
  bool success = 1;
  optional string error = 2;
  // True when the write was rejected because expected_sha256 did not match —
  // the caller should re-read, re-apply its change, and retry.
  bool conflict = 3;
}

// ============================================
// Service Definition
// ============================================

service TreeTermDaemon {
  // PTY Session Management (Unary RPCs)
  rpc CreatePty(CreatePtyRequest) returns (CreatePtyResponse);
  rpc KillPty(KillPtyRequest) returns (Empty);
  rpc ListPtySessions(Empty) returns (ListPtySessionsResponse);

  // PTY Data Streaming (Bidirectional)
  // Client sends input (write/resize), server sends output (data/exit)
  rpc PtyStream(stream PtyInput) returns (stream PtyOutput);

  // Exec Streaming (Bidirectional)
  // For executing one-shot shell commands with streaming I/O
  rpc ExecStream(stream ExecInput) returns (stream ExecOutput);

  // Workspace Session Management (one session per daemon)
  rpc UpdateSession(UpdateSessionRequest) returns (Session);
  rpc SessionWatch(SessionWatchRequest) returns (stream SessionWatchEvent);
  rpc LockSession(LockSessionRequest) returns (LockSessionResponse);
  rpc UnlockSession(UnlockSessionRequest) returns (Session);
  rpc ForceUnlockSession(ForceUnlockSessionRequest) returns (Session);

  // Daemon Control
  rpc Shutdown(Empty) returns (Empty);

  // Filesystem Operations
  rpc ReadDirectory(ReadDirectoryRequest) returns (ReadDirectoryResponse);
  rpc ReadFile(ReadFileRequest) returns (stream FileReadChunk);
  rpc WriteFile(stream FileWriteChunk) returns (WriteFileResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
  rpc SearchFiles(SearchFilesRequest) returns (SearchFilesResponse);

  // File Watching (server-streaming; first event is the current state).
  // Change detection: OS-native watch + polling re-read + WriteFile/DeleteFile
  // RPC interception, deduped by content SHA-256.
  rpc WatchFile(WatchFileRequest) returns (stream FileWatchEvent);
  rpc WatchFileSignal(WatchFileRequest) returns (stream FileSignalEvent);
}
