<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e1e1e;
      color: #cccccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #3c3c3c;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      font-size: 13px;
      color: #858585;
      letter-spacing: 0.3px;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #cccccc;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>
  <div class="logo">TreeTerm</div>
  <div class="spinner"></div>
  <div class="message">Connecting to daemon...</div>
</body>
</html>
